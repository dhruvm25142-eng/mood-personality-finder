<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MoodScope</title>
  <link rel="stylesheet" href="style.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-content">
      <h2>MoodScope</h2>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- QUESTIONS -->
    <div class="card" id="questionSection">

      <h1>Understand your mood</h1>
      <p class="subtitle">Answer honestly, no overthinking 😈</p>

      <!-- Q1 -->
      <div class="question">
        <p>How was your day?</p>
        <div class="options">
          <button onclick="selectAnswer('happy', this)">Good</button>
          <button onclick="selectAnswer('sad', this)">Bad</button>
          <button onclick="selectAnswer('overthinker', this)">Confusing</button>
        </div>
      </div>

      <!-- Q2 -->
      <div class="question">
        <p>What’s your current state?</p>
        <div class="options">
          <button onclick="selectAnswer('happy', this)">Relaxed</button>
          <button onclick="selectAnswer('sad', this)">Low</button>
          <button onclick="selectAnswer('overthinker', this)">Overthinking</button>
        </div>
      </div>

      <!-- Q3 -->
      <div class="question">
        <p>How do you handle problems?</p>
        <div class="options">
          <button onclick="selectAnswer('happy', this)">Stay positive</button>
          <button onclick="selectAnswer('sad', this)">Feel overwhelmed</button>
          <button onclick="selectAnswer('overthinker', this)">Think too much</button>
        </div>
      </div>

      <!-- Q4 -->
      <div class="question">
        <p>Pick your vibe:</p>
        <div class="options">
          <button onclick="selectAnswer('happy', this)">Chill</button>
          <button onclick="selectAnswer('sad', this)">Heavy</button>
          <button onclick="selectAnswer('overthinker', this)">Restless</button>
        </div>
      </div>

      <button class="primary-btn" onclick="showResult()">See Result</button>
    </div>

    <!-- RESULT -->
    <div class="card hidden" id="resultSection">
      <h1 id="resultTitle"></h1>
      <p class="result-sub">Here’s something for you</p>

      <div id="quoteBox">Loading...</div>

      <div class="result-actions">
        <button class="secondary-btn" onclick="getQuote()">New Quote</button>
        <button class="primary-btn" onclick="restart()">Start Again</button>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>©️ 2026 MoodScope</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
