<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MoodScope</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <h2>MoodScope</h2>
    <button id="themeToggle">🌙</button>
  </nav>

  <!-- Main -->
  <main>

    <!-- Questions -->
    <section id="questionSection">
      <h1>How are you feeling today?</h1>

      <div class="question">
        <p>1. How was your day?</p>
        <button onclick="selectAnswer('happy', this)">Great 😊</button>
        <button onclick="selectAnswer('sad', this)">Bad 😔</button>
        <button onclick="selectAnswer('overthinker', this)">Confusing 🤯</button>
      </div>

      <div class="question">
        <p>2. What are you doing right now?</p>
        <button onclick="selectAnswer('happy', this)">Chilling 😎</button>
        <button onclick="selectAnswer('sad', this)">Nothing 😞</button>
        <button onclick="selectAnswer('overthinker', this)">Thinking 🤯</button>
      </div>

      <div class="question">
        <p>3. Pick your vibe:</p>
        <button onclick="selectAnswer('happy', this)">Positive ✨</button>
        <button onclick="selectAnswer('sad', this)">Low 😢</button>
        <button onclick="selectAnswer('overthinker', this)">Restless 😵</button>
      </div>

      <button id="submitBtn" onclick="showResult()">See Result</button>
    </section>

    <!-- Result -->
    <section id="resultSection" class="hidden">
      <div class="result-container">

        <h1 id="resultTitle"></h1>

        <div class="controls">
          <input type="text" id="searchInput" placeholder="Search quotes..." />
          <select id="filterMood">
            <option value="all">All</option>
            <option value="happy">Happy</option>
            <option value="sad">Sad</option>
            <option value="overthinker">Overthinker</option>
          </select>
        </div>

        <div id="quoteBox" class="quote-box"></div>

        <div class="actions">
          <button onclick="getQuote()">New Quote</button>
          <button onclick="restart()">Start Again</button>
        </div>

      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <p>© 2026 MoodScope</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
